package:
  name: roq-okx
  version: {{ GIT_DESCRIBE_TAG }}

source:
  git_url: ..

build:
  skip: True  # [win]
  number: {{ GIT_DESCRIBE_NUMBER }}
  run_exports:
    - {{ pin_subpackage('roq-okx', max_pin='x.x.x') }}
  script_env:                                                                                                              
    - ROQ_BUILD_TYPE

requirements:
  build:
    - {{ compiler('cxx') }}
    - clangdev
    - cmake
    - make
  host:
    - roq-core
    - abseil-cpp
    - roq-oss-benchmark
    - roq-oss-brotli
    - roq-oss-catch2
    - roq-oss-libsodium
    - roq-oss-magic_enum
    - roq-oss-range-v3
    - roq-oss-re2
    - roq-oss-tomlplusplus
    - roq-server
    - roq-web

about:
  home: https://roq-trading.com
  doc_url: https://roq-trading.com/docs
  dev_url: https://github.com/roq-trading
  license: Commercial
  license_family: PROPRIETARY
  license_file: LICENSE
  summary: Roq OKX Gateway
